name: "Multi event pipeline" # Name of the pipeline

on:
    push: # Event : whenever a push is made to the repository on the master/test branch
        branches:
            - master
            - test
    pull_request: # Event : whenever a pull request is made to the repository on the master/test branch
        branches:
            - master
        types:
            - closed
    workflow_dispatch: # Event : whenever a workflow dispatch is made to the repository on the master/test branch

jobs:
    on-push: # Job 1 name
        # we need to use if, or else the job will run on both push and pull_request events
        if: github.event_name == 'push'
        runs-on: ubuntu-latest
        steps: # Steps to be executed in the job
            - name: "Running on master push"
              run: echo "Running on master/test push"

    on-pull-request: # Job 2 name
        if: github.event_name == 'pull_request' && github.event.action == 'opened'
        runs-on: ubuntu-latest
        steps: # Steps to be executed in the job
            - name: "Running on pull request"
              run: echo "Running on pull request"

    on-pull-request-closed:
        if: github.event_name == 'pull_request' && github.event.action == 'closed'
        runs-on: ubuntu-latest
        steps: # Steps to be executed in the job
            - name: "Running on pull request closed"
              run: echo "Running on pull request closed"

    on-workflow-dispatch: # Job 3 name
        if: github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        steps: # Steps to be executed in the job
            - name: "Running on workflow dispatch"
              run: echo "Running on workflow dispatch"
